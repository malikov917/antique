appId: host.exp.Exponent
---
- launchApp
- openLink: ${EXPO_DEV_URL}
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn:
          point: "92%,16%"
- tapOn:
    id: "tab-activity"
- assertVisible:
    id: "activity-screen"
- extendedWaitUntil:
    visible: "Offer submitted"
    timeout: 20000
- tapOn:
    id: "tab-inbox"
- assertVisible:
    id: "inbox-screen"
- extendedWaitUntil:
    visible: "Deal status:"
    timeout: 20000
